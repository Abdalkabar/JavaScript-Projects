<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One-Page Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }
        section {
            margin-bottom: 20px;
        }
        footer {
            text-align: center;
            padding: 10px;
            background-color: #f1f1f1;
        }
        nav {
            background-color: #333;
            padding: 10px;
        }
        nav a {
            color: white;
            padding: 10px;
            text-decoration: none;
            margin: 0 10px;
        }
        nav a:hover {
            background-color: #575757;
        }

        /* Lightbox Styles */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .gallery img {
            cursor: pointer;
            width: 100%;
            height: auto;
            border-radius: 8px;
            transition: transform 0.3s ease;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        #lightboxModal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #lightboxModal.active {
            display: flex;
        }

        .lightbox-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .lightbox-content img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 8px;
        }

        #lightboxCaption {
            color: #fff;
            text-align: center;
            margin-top: 15px;
            font-size: 1.1rem;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            background: none;
            border: none;
            z-index: 1001;
        }

        .close-btn:hover {
            color: #ccc;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #fff;
            font-size: 30px;
            cursor: pointer;
            padding: 20px;
            z-index: 1001;
        }

        .lightbox-nav:hover {
            color: #ccc;
        }

        #prevBtn {
            left: 20px;
        }

        #nextBtn {
            right: 20px;
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav>
        <a href="#home">Home</a>
        <a href="#pictures">Pictures</a>
        <a href="#contact">Contact</a>
        <a href="#video">Video</a>
    </nav>

    <!-- Home Page Section -->
    <section id="home">
        <h1>Welcome to My One-Page Website</h1>
        <p>This is the home page section where we can introduce ourselves and our website.</p>
    </section>

    <!-- Pictures Section -->
    <section id="pictures">
        <h2>Picture Gallery</h2>
        
        <div class="gallery">
            <img class="gallery-img" src="https://img.freepik.com/free-photo/pug-dog-isolated-white-background_2829-11416.jpg?semt=ais_hybrid&w=740&q=80" alt="Pug dog isolated on a white background">
            <img class="gallery-img" src="https://static.vecteezy.com/system/resources/thumbnails/008/951/892/small/cute-puppy-pomeranian-mixed-breed-pekingese-dog-run-on-the-grass-with-happiness-photo.jpg" alt="Cute puppy running on grass">
            <img class="gallery-img" src="https://images.dog.ceo/breeds/beagle/beagle3.jpg" alt="Beagle dog in outdoor setting">
        </div>

        <!-- Lightbox Modal -->
        <div id="lightboxModal">
            <button class="close-btn" onclick="closeLightbox()">&times;</button>
            <button class="lightbox-nav" id="prevBtn" onclick="changeSlide(-1)">&#10094;</button>
            <div class="lightbox-content">
                <img id="lightboxImage" src="" alt="">
                <p id="lightboxCaption"></p>
            </div>
            <button class="lightbox-nav" id="nextBtn" onclick="changeSlide(1)">&#10095;</button>
        </div>
    </section>

    <!-- Contact Form Section -->
    <section id="contact">
        <h2>Contact Us</h2>
        <form>
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name"><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email"><br><br>

            <input type="submit" value="Submit">
        </form>
    </section>

    <!-- Video Section -->
    <section id="video">
        <h2>Video Section</h2>
        <iframe width="560" height="315"
            src="https://www.youtube.com/embed/5MpfPbFlpNw"
            title="YouTube video"
            frameborder="0"
            allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
        </iframe>
    </section>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2026 One-Page Website</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
